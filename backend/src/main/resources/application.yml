server:
  port: 8080

spring:
  application:
    name: record
  
  # H2 인메모리 데이터베이스 설정
  datasource:
    url: jdbc:h2:mem:recorddb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 설정
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

